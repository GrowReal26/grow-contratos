<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROW Real — Contratos</title>
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .header-logo { font-size: 16px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  .header-logo span { color: #4a7c59; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .new-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 2rem; transition: background 0.15s; }
  .new-btn:hover { background: #333; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 440px; margin: 1rem; }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 5px; }
  .field input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .field input:focus { outline: none; border-color: #1a1a1a; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.5rem; }
  .btn-primary { flex: 1; padding: 10px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: #333; }
  .btn-secondary { padding: 10px 16px; background: transparent; color: #666; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .contracts-list { display: flex; flex-direction: column; gap: 10px; }
  .contract-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1.25rem 1.5rem; }
  .contract-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
  .contract-id { font-size: 11px; font-weight: 600; color: #4a7c59; background: #f0f7f2; padding: 3px 8px; border-radius: 20px; }
  .contract-name { font-size: 15px; font-weight: 600; margin: 6px 0 2px; }
  .contract-addr { font-size: 13px; color: #666; }
  .contract-date { font-size: 11px; color: #999; }
  .progress-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .prog-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; border: 1px solid #e5e5e5; color: #999; }
  .prog-pill.done { background: #f0f7f2; border-color: #b6d9c3; color: #3a6b48; }
  .prog-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .links-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; color: #444; background: #fafafa; cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .link-btn:hover { border-color: #999; background: #f5f5f5; }
  .gen-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border: 1px solid #1a1a1a; border-radius: 6px; font-size: 12px; color: #1a1a1a; background: #fff; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .gen-btn:hover { background: #1a1a1a; color: #fff; }
  .gen-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .empty { text-align: center; padding: 3rem; color: #999; font-size: 14px; }
  .copied-toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; display: none; z-index: 200; }
  .copied-toast.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">GROW <span>Real</span> — Contratos</div>
</div>

<div class="container">
  <div class="page-title">Contratos activos</div>
  <div class="page-sub">Crea un contrato, envía los links a cada parte y genera el borrador cuando estén completos.</div>

  <button class="new-btn" onclick="openModal()">
    + Nuevo contrato
  </button>

  <div class="contracts-list" id="contracts-list">
    <div class="empty">Cargando contratos...</div>
  </div>
</div>

<!-- Modal nuevo contrato -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Nuevo contrato</h3>
    <div class="field">
      <label>Nombre de referencia (ej: Dr. Simi Ñuñoa)</label>
      <input type="text" id="nuevo-nombre" placeholder="Arrendatario + dirección">
    </div>
    <div class="field">
      <label>Dirección del inmueble</label>
      <input type="text" id="nuevo-direccion" placeholder="Calle, número, local, comuna">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="crearContrato()">Crear contrato</button>
    </div>
  </div>
</div>

<div class="copied-toast" id="toast">Link copiado al portapapeles</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
const BASE_URL = window.location.origin + window.location.pathname.replace('index.html','').replace(/\/$/, '');

function openModal() { document.getElementById('modal-bg').classList.add('open'); document.getElementById('nuevo-nombre').focus(); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

async function crearContrato() {
  const nombre = document.getElementById('nuevo-nombre').value.trim();
  const direccion = document.getElementById('nuevo-direccion').value.trim();
  if (!nombre || !direccion) { alert('Completa ambos campos.'); return; }
  const id = 'CT-' + Date.now().toString(36).toUpperCase();
  const { error } = await db.from('contratos').insert({ id, nombre_referencia: nombre, direccion_inmueble: direccion });
  if (error) { alert('Error al crear: ' + error.message); return; }
  closeModal();
  document.getElementById('nuevo-nombre').value = '';
  document.getElementById('nuevo-direccion').value = '';
  cargarContratos();
}

async function cargarContratos() {
  const { data: contratos, error } = await db.from('contratos').select('*').order('creado_en', { ascending: false });
  if (error) { document.getElementById('contracts-list').innerHTML = '<div class="empty">Error al cargar contratos.</div>'; return; }
  if (!contratos || contratos.length === 0) { document.getElementById('contracts-list').innerHTML = '<div class="empty">No hay contratos aún. Crea el primero.</div>'; return; }

  const [{ data: ats }, { data: ars }, { data: gs }] = await Promise.all([
    db.from('datos_arrendatario').select('contrato_id'),
    db.from('datos_arrendadora').select('contrato_id'),
    db.from('datos_grow').select('contrato_id'),
  ]);

  const atIds = new Set((ats||[]).map(r => r.contrato_id));
  const arIds = new Set((ars||[]).map(r => r.contrato_id));
  const gIds  = new Set((gs||[]).map(r => r.contrato_id));

  const html = contratos.map(c => {
    const hasAt = atIds.has(c.id);
    const hasAr = arIds.has(c.id);
    const hasG  = gIds.has(c.id);
    const allDone = hasAt && hasAr && hasG;
    const fecha = new Date(c.creado_en).toLocaleDateString('es-CL');
    return `
    <div class="contract-card">
      <div class="contract-card-top">
        <div>
          <div class="contract-id">${c.id}</div>
          <div class="contract-name">${c.nombre_referencia}</div>
          <div class="contract-addr">${c.direccion_inmueble}</div>
        </div>
        <div class="contract-date">${fecha}</div>
      </div>
      <div class="progress-row">
        <div class="prog-pill ${hasAt ? 'done' : ''}"><span class="prog-dot"></span> Arrendatario</div>
        <div class="prog-pill ${hasAr ? 'done' : ''}"><span class="prog-dot"></span> Arrendadora</div>
        <div class="prog-pill ${hasG  ? 'done' : ''}"><span class="prog-dot"></span> GROW</div>
      </div>
      <div class="links-row">
        <button class="link-btn" onclick="copyLink('${c.id}','arrendatario')">&#128279; Link Arrendatario</button>
        <button class="link-btn" onclick="copyLink('${c.id}','arrendadora')">&#128279; Link Arrendadora</button>
        <button class="link-btn" onclick="copyLink('${c.id}','grow')">&#128279; Link GROW</button>
        <button class="gen-btn" ${allDone ? '' : 'disabled'} onclick="window.location.href='generar.html?id=${c.id}'">
          &#9654; Generar contrato
        </button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('contracts-list').innerHTML = html;
}

function copyLink(id, modulo) {
  const url = `${BASE_URL}/${modulo}.html?id=${id}`;
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
cargarContratos();
setInterval(cargarContratos, 15000);
</script>
</body>
</html>
